{% extends "base.html" %}

{% block content %}
<div class="container py-5 text-white">
    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card bg-dark border-secondary p-4 shadow-lg">
                <h4 class="rg-gold mb-4 border-bottom border-warning pb-2">Order Summary</h4>
                <div style="max-height: 350px; overflow-y: auto;">
                    {% for item in items %}
                    <div class="d-flex align-items-center mb-3 border-bottom border-secondary pb-3">
                        <img src="{{ url_for('static', filename='images/' + item.image) }}" 
                             style="width: 60px; height: 60px; object-fit: contain;" class="rounded bg-light p-1 me-3">
                        <div class="flex-grow-1">
                            <h6 class="mb-0">{{ item.name }}</h6>
                            <p class="mb-0 text-warning fw-bold">₹{{ item.price }}</p>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <h5>Grand Total:</h5>
                    <h3 class="rg-gold">₹{{ total }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card bg-dark border-gold p-4 shadow-lg" style="border: 1px solid #ffcc00;">
                <h4 class="rg-gold mb-4">Delivery Details</h4>
                <form id="payment-form">
                    <div class="mb-3">
                        <label class="small text-white-50">Full Name</label>
                        <input type="text" id="cust_name" class="form-control bg-dark text-white border-secondary" required placeholder="Aman Gupta">
                    </div>
                    <div class="mb-3">
                        <label class="small text-white-50">Phone Number</label>
                        <input type="number" id="cust_phone" class="form-control bg-dark text-white border-secondary" required placeholder="91XXXXXXXX">
                    </div>
                    <div class="mb-4">
                        <label class="small text-white-50">Shipping Address</label>
                        <textarea id="cust_address" class="form-control bg-dark text-white border-secondary" rows="3" required placeholder="Complete Address..."></textarea>
                    </div>

                    <button type="button" id="rzp-button" class="btn btn-warning w-100 py-3 fw-bold">
                        <i class="fas fa-lock me-2"></i> PAY NOW (₹{{ total }})
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ key_id }}",
        "amount": "{{ amount }}",
        "currency": "INR",
        "name": "Rishab Gold Lighting",
        "description": "Order for Aman Studio",
        "order_id": "{{ order_id }}",
        "handler": function (response){
            var name = document.getElementById('cust_name').value;
            window.location.href = "/payment_success?pay_id=" + response.razorpay_payment_id + "&name=" + encodeURIComponent(name);
        },
        "theme": { "color": "#D4AF37" }
    };

    var rzp = new Razorpay(options);
    document.getElementById('rzp-button').onclick = function(e){
        if(!document.getElementById('cust_name').value) { alert("Please fill details!"); return; }
        rzp.open();
        e.preventDefault();
    }
</script>
{% endblock %}
