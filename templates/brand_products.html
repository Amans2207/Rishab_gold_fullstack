{% extends "base.html" %}

{% block content %}
<style>
    .product-card { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; transition: 0.4s; overflow: hidden; }
    .product-card:hover { transform: translateY(-10px); border-color: #ffcc00; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15); }
    .product-img { height: 200px; object-fit: contain; padding: 20px; transition: 0.5s; }
    .product-card:hover .product-img { transform: scale(1.1); }
    .whatsapp-btn { background: linear-gradient(45deg, #128C7E, #25D366); border: none; font-weight: 600; }
    .rg-gold { color: #ffcc00; }
</style>

<div class="container py-5">
    <div class="row mb-5 align-items-center">
        <div class="col-md-6">
            <h1 class="rg-gold fw-bold">{{ brand }} Collection</h1>
        </div>
        <div class="col-md-6">
            <form class="d-flex shadow-sm">
                <input type="text" name="search" class="form-control bg-dark text-white border-secondary" placeholder="Search from 400+ items...">
                <button class="btn btn-warning ms-2 px-4 fw-bold">Search</button>
            </form>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for p in products %} <div class="col">
            <div class="card h-100 product-card text-white">
                <span class="badge bg-success position-absolute top-0 end-0 m-3">Stock: {{ p.stock }}</span>
                
                <img src="{{ url_for('static', filename='images/' + p.image) }}" 
                     class="product-img" alt="{{ p.name }}">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title rg-gold">{{ p.name }}</h5>
                    <p class="card-text fs-5 fw-bold text-white">₹{{ p.price }}</p>
                    
                    <div class="mt-auto">
                        <a href="https://wa.me/{{ info.contact }}?text=Hello%20Rishab%20Gold,%20I%20want%20to%20inquire%20about%20{{ p.name }}" 
                           target="_blank" 
                           class="btn btn-outline-success w-100 mb-2 fw-bold">
                           <i class="fab fa-whatsapp"></i> INQUIRY ON WHATSAPP
                        </a>

                        <div class="d-flex gap-2">
                            <a href="{{ url_for('add_to_cart', product_id=p.id) }}" 
                               class="btn btn-outline-warning w-25">
                                <i class="fas fa-shopping-cart"></i>
                            </a>
                            <a href="{{ url_for('add_to_cart', product_id=p.id) }}?next=cart" 
                               class="btn btn-warning w-75 fw-bold">
                                BUY NOW
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %} </div>
</div>
{% endblock %}
