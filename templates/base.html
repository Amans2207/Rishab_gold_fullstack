<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rishab Gold | Luxury Lighting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        .rg-gold { color: var(--gold); }
        .navbar-custom { background: var(--dark); border-bottom: 2px solid var(--gold); padding: 10px 0; }
        .brand-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 2px; text-decoration: none; }
        .content-wrapper { flex: 1; }
        .footer { background: #000; border-top: 1px solid #333; }
        .btn-outline-warning { border-color: var(--gold); color: var(--gold); border-radius: 50px; }
        .btn-outline-warning:hover { background-color: var(--gold); color: #000; }
        .btn-warning { background-color: var(--gold); color: #000; border: none; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar-custom sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="brand-logo rg-gold">RISHAB GOLD</a>
            <div class="d-flex align-items-center gap-3">
                <form class="d-none d-md-flex" action="/search" method="GET">
                    <input class="form-control me-2 bg-dark text-white border-secondary" type="search" name="q" placeholder="Search products...">
                    <button class="btn btn-warning btn-sm px-3" type="submit">Search</button>
                </form>
                <a href="{{ url_for('view_cart') }}" class="btn btn-outline-warning position-relative px-3 d-flex align-items-center">
                    <i class="fas fa-shopping-cart me-2"></i> 
                    <span class="d-none d-sm-inline">Cart</span>
                    {% set cart_len = session.get('cart', [])|length %}
                    {% if cart_len > 0 %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.7rem;">{{ cart_len }}</span>
                    {% endif %}
                </a>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer mt-5 pt-4 pb-3">
        <div class="container text-center">
            <p class="rg-gold fw-bold">RISHAB GOLD</p>
            <p class="text-light small">Pune, Maharashtra | +91 9156934911</p>
            <hr style="border-color: #222;">
            <p class="text-light small mb-0">&copy; 2026 Developed by Aman Studio</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
