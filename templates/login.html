{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card bg-dark border-warning p-4 shadow-lg text-white" style="border-radius: 20px;">
                <h3 class="text-center rg-gold mb-4">Admin Login</h3>
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control bg-black text-white border-secondary" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control bg-black text-white border-secondary" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold">ENTER DASHBOARD</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
