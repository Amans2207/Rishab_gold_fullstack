{% extends "base.html" %}
{% block content %}
<div class="container py-5 text-white">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="rg-gold">Inventory Management</h2>
        <div>
            <a href="/add_product" class="btn btn-warning fw-bold">+ Add New Product</a>
            <a href="/logout" class="btn btn-outline-danger ms-2">Logout</a>
        </div>
    </div>

    <div class="table-responsive bg-dark p-3 rounded-4 border border-secondary">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr class="rg-gold">
                    <th>Image</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td><img src="/static/images/{{ p.image }}" width="50" class="rounded"></td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.brand }}</td>
                    <td>₹{{ p.price }}</td>
                    <td><span class="badge {% if p.stock > 10 %}bg-success{% else %}bg-danger{% endif %}">{{ p.stock }}</span></td>
                    <td>
                        <button class="btn btn-sm btn-info text-white"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
